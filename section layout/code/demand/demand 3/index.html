<link rel="stylesheet" href="./style.css">

<section id="seclayout-demand-3" data-name="seclayout-demand-3" data-tag="section, form">
  <div class="container">
    <div class="content">
      <div class="form-heading">
        <h2 class="form-heading-txt">عروض الباقات</h2>
        <p class="form-heading-paragraph">عرض صالح ليوم فقط - اختر العرض المناسب لك</p>
      </div>
      <div class="form-wrapper">
        <form class="form-body" data-form-type="leads" data-form-name="demand_form_seclayout" data-form-id="seclayout-demand-3-form">
          <label class="half-span">
            <span class="ouasl_field-title">الاسم الكامل</span>
            <input type="text" name="full_name" placeholder="الاسم الكامل" required />
          </label>
          <label class="half-span">
            <span class="ouasl_field-title">رقم الجوال (واتساب)</span>
            <input type="tel" name="phone" placeholder="رقم الجوال (واتساب)" required />
          </label>
          <label>
            <span class="ouasl_field-title">المدينة + العنوان</span>
            <input type="text" name="address" placeholder="المدينة + العنوان" required />
          </label>
          <div class="ouasl_field-radios">
            <div class="ouasl_field-radios_title">
              <h4 class="option-description-title">المقاس</h4>
            </div>
            <label class="radio active">
              <span class="ouasl_field-title">L</span>
              <input type="radio" name="size" value="L" checked>
            </label>
            <label class="radio">
              <span class="ouasl_field-title">M</span>
              <input type="radio" name="size" value="M">
            </label>
            <label class="radio">
              <span class="ouasl_field-title">XL</span>
              <input type="radio" name="size" value="XL">
            </label>
            <label class="radio">
              <span class="ouasl_field-title">XXL</span>
              <input type="radio" name="size" value="XXL">
            </label>
            <label class="radio">
              <span class="ouasl_field-title">3XL</span>
              <input type="radio" name="size" value="3XL">
            </label>
          </div>
          <div class="ouasl_field-radios">
            <div class="ouasl_field-radios_title">
              <h4 class="option-description-title">الكمية</h4>
            </div>
            <label class="radio">
              <span class="ouasl_field-title">1</span>
              <input type="radio" name="quantity" value="1">
            </label>
            <label class="radio active">
              <span class="ouasl_field-title">2</span>
              <input type="radio" name="quantity" value="2" checked>
            </label>
            <label class="radio">
              <span class="ouasl_field-title">3</span>
              <input type="radio" name="quantity" value="3">
            </label>
          </div>
          <div class="btn-cta submit-form-btn">
            <button type="submit" role="button" class="button-cta">تأكيد الطلب الآن</button>
          </div>
        </form>
        <p class="connect">سنقوم بالتواصل عبر واتساب لتأكيد الطلب وموعد التسليم. الدفع عند الاستلام. بياناتك آمنة ولن تُشارك.</p>
      </div>
    </div>
  </div>
</section>

<script src="./index.js"></script>
