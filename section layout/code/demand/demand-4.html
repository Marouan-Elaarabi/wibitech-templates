<link rel="stylesheet" href="./demand-4.css">

  <section id="seclayout-demand-4" data-name="seclayout-demand-4" data-tag="section, form">
    <div class="container">
      <div class="content">
        <h2 class="demand-title wrapper">أفضل منتجات العناية بالجلد و البشرة طبيعية 100%</h2>
        <div class="demand-pricing">
          <span class="demand-price-old wrapper">$59.99</span>
          <span class="demand-price-new wrapper">$59.99</span>
        </div>
        <form class="demand-form" data-form-type="demand" data-form-name="demand_form_seclayout_4" data-form-id="seclayout-demand-4-form">
          <label>
            <span class="ouasl_field-title wrapper">الاسم الكامل</span>
            <input type="text" name="full_name" placeholder="الاسم الكامل" required />
          </label>
          <label>
            <span class="ouasl_field-title wrapper">المدينة + العنوان</span>
            <input type="text" name="address" placeholder="المدينة + العنوان" required />
          </label>
          <label>
            <span class="ouasl_field-title wrapper">رقم الهاتف</span>
            <input type="tel" name="phone" placeholder="رقم الهاتف" required />
          </label>
          <div class="demand-quantity">
            <span class="ouasl_field-title wrapper">الكمية</span>
            <div class="quantity-controls">
              <button type="button" class="qty-btn minus">‹</button>
              <span class="qty-value">3</span>
              <button type="button" class="qty-btn plus">›</button>
            </div>
          </div>
          <button type="submit" class="submit-btn wrapper">إشتري الآن - الدفع عند الإستلام</button>
        </form>
      </div>
    </div>
  </section>

<script src="./demand-4.js"></script>
