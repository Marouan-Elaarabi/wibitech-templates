<link rel="stylesheet" href="./demand-1.css">

  <section id="seclayout-demand-1" data-name="seclayout-demand-1" data-tag="section, form">
    <div class="container">
      <div class="content">
        <div class="demand-image wrapper">
          <img src="../images/demand-product.webp" alt="product image">
        </div>
        <div class="demand-form-body">
          <div class="demand-header">
            <p class="demand-label wrapper">اختر العرض المناسب لك :</p>
            <p class="demand-urgency wrapper">عرض صالح ليوم فقط!</p>
          </div>
          <div class="demand-offers">
            <label class="demand-offer active">
              <input type="radio" name="offer" value="199" checked>
              <span class="demand-offer-text wrapper">1 = 199 ريال</span>
            </label>
            <label class="demand-offer">
              <input type="radio" name="offer" value="349">
              <span class="demand-offer-text wrapper">2 = 349 ريال</span>
            </label>
            <label class="demand-offer">
              <input type="radio" name="offer" value="499">
              <span class="demand-offer-text wrapper">3 = 499 ريال</span>
              <span class="demand-offer-badge wrapper">🔥 الأكثر طلبًا</span>
            </label>
          </div>
          <form class="demand-form" data-form-type="demand" data-form-name="demand_form_seclayout" data-form-id="seclayout-demand-1-form">
            <label>
              <span class="ouasl_field-title wrapper">الاسم الكامل :</span>
              <input type="text" name="full_name" placeholder="الاسم الكامل" required />
            </label>
            <label>
              <span class="ouasl_field-title wrapper">رقم الجوال (واتساب) :</span>
              <input type="tel" name="phone" placeholder="رقم الجوال (واتساب)" required />
            </label>
            <label>
              <span class="ouasl_field-title wrapper">المدينة + العنوان :</span>
              <textarea name="address" placeholder="العنوان" rows="3" required></textarea>
            </label>
            <button type="submit" class="submit-btn wrapper">تأكيد الطلب الآن</button>
          </form>
          <p class="demand-disclaimer wrapper">سنقوم بالتواصل عبر واتساب لتأكيد الطلب وموعد التسليم. الدفع عند الاستلام. بياناتك آمنة ولن تُشارك.</p>
        </div>
      </div>
    </div>
  </section>

<script src="./demand-1.js"></script>
