<link rel="stylesheet" href="./style.css">

<section id="seclayout-demand-4" data-name="seclayout-demand-4" data-tag="section, form">
  <div class="container">
    <div class="content">
      <div class="demand-form">
        <h2 class="demand-title">أفضل منتجات العناية بالجلد و البشرة طبيعية 100%</h2>

        <div class="demand-price-row">
          <p class="old-price">599 ريال</p>
          <p class="new-price">299 ريال</p>
        </div>

        <form data-form-type="leads" data-form-name="demand_form_seclayout" data-form-id="seclayout-demand-4-form">
          <label>
            <span class="ouasl_field-title">الاسم الكامل</span>
            <input type="text" name="full_name" placeholder="الاسم الكامل" required />
          </label>
          <label>
            <span class="ouasl_field-title">المدينة + العنوان</span>
            <input type="text" name="address" placeholder="المدينة + العنوان" required />
          </label>
          <label>
            <span class="ouasl_field-title">رقم الهاتف</span>
            <input type="tel" name="phone" placeholder="رقم الهاتف" required />
          </label>

          <label class="quantity-control">
            <span class="ouasl_field-title">الكمية</span>
            <div class="quantity-box">
              <button type="button" class="qty-btn qty-minus">&#8249;</button>
              <input type="number" name="quantity" value="3" min="1" class="qty-input" readonly />
              <button type="button" class="qty-btn qty-plus">&#8250;</button>
            </div>
          </label>

          <button type="submit" class="demand-submit">إشتري الآن - الدفع عند الإستلام</button>
        </form>
      </div>
    </div>
  </div>
</section>

<script src="./index.js"></script>
