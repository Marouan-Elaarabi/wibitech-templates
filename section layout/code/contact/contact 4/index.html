<link rel="stylesheet" href="./style.css">

<section id="seclayout-contact-4" data-name="seclayout-contact-4" data-tag="section, form">
  <div class="container">
    <div class="content">
      <div class="contact-text">
        <h2 class="contact-title">اتصل بنا</h2>
        <p class="contact-description">نحن مفتوحون ستة أيام في الأسبوع حتى وقت متأخر، ونقدم قائمة الطعام الكاملة في غرفة الطعام والبار. نقدر استفسارك، وسيقوم أحد أفراد فريقنا بالرد قريبًا.</p>
      </div>
      <form data-form-type="contact" data-form-name="contact_form_seclayout" data-form-id="seclayout-contact-4-form">
        <label>
          <span class="ouasl_field-title">الاسم الكامل</span>
          <input type="text" name="full_name" placeholder="الاسم الكامل" required />
        </label>
        <label>
          <span class="ouasl_field-title">البريد الالكتروني</span>
          <input type="email" name="email" placeholder="البريد الالكتروني" required />
        </label>
        <label>
          <span class="ouasl_field-title">رسالتك</span>
          <textarea name="message" placeholder="رسالتك" rows="5" required></textarea>
        </label>
        <button type="submit" class="contact-submit">أرسل الرسالة</button>
      </form>
    </div>
  </div>
</section>

<script src="./index.js"></script>
