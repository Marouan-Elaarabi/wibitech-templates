<link rel="stylesheet" href="./contact-3.css">

  <section id="seclayout-contact-3" data-name="seclayout-contact-3" data-tag="section, form">
    <div class="container">
      <div class="content">
        <div class="contact-image wrapper">
          <img src="../images/contact-image.webp" alt="contact image">
        </div>
        <div class="contact-form-body">
          <h2 class="contact-title wrapper">اتصل بنا</h2>
          <p class="contact-desc wrapper">نحن مفتوحون ستة أيام في الأسبوع حتى وقت متأخر، ونقدم قائمة الطعام الكاملة في غرفة الطعام والبار. نقدر استفسارك، وسيقوم أحد أفراد فريقنا بالرد قريبًا.</p>
          <form class="contact-form" data-form-type="contact" data-form-name="contact_form_seclayout" data-form-id="seclayout-contact-3-form">
            <label>
              <span class="ouasl_field-title wrapper">الاسم الكامل</span>
              <input type="text" name="full_name" placeholder="الاسم الكامل" required />
            </label>
            <label>
              <span class="ouasl_field-title wrapper">البريد الالكتروني</span>
              <input type="email" name="email" placeholder="البريد الالكتروني" required />
            </label>
            <label>
              <span class="ouasl_field-title wrapper">رسالتك</span>
              <textarea name="message" placeholder="رسالتك" rows="4" required></textarea>
            </label>
            <button type="submit" class="submit-btn wrapper">أرسل الرسالة</button>
          </form>
        </div>
      </div>
    </div>
  </section>
