<link rel="stylesheet" href="./style.css">

<section id="seclayout-contact-5" data-name="seclayout-contact-5" data-tag="section, form">
  <div class="container">
    <div class="content">
      <h2 class="contact-title">اتصل بنا</h2>

      <div class="contact-body">
        <div class="contact-info wrapper">
          <div class="info-item">
            <div class="info-icon oa-box__icon">
              <img src="https://cdn.ouasl.com/assets/default-images/phone-icon.svg" alt="هاتف">
            </div>
            <div class="info-text content-box">
              <h3 class="info-label">الهاتف</h3>
              <p class="info-value">+966 50 000 0000</p>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon oa-box__icon">
              <img src="https://cdn.ouasl.com/assets/default-images/email-icon.svg" alt="بريد">
            </div>
            <div class="info-text content-box">
              <h3 class="info-label">البريد الإلكتروني</h3>
              <p class="info-value">info@example.com</p>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon oa-box__icon">
              <img src="https://cdn.ouasl.com/assets/default-images/location-icon.svg" alt="موقع">
            </div>
            <div class="info-text content-box">
              <h3 class="info-label">الموقع</h3>
              <p class="info-value">الرياض، المملكة العربية السعودية</p>
            </div>
          </div>
        </div>

        <div class="contact-form wrapper">
          <form data-form-type="contact" data-form-name="contact_form_seclayout" data-form-id="seclayout-contact-5-form">
            <label>
              <span class="ouasl_field-title"></span>
              <input type="text" name="full_name" placeholder="الاسم الكامل" required />
            </label>
            <label>
              <span class="ouasl_field-title"></span>
              <input type="email" name="email" placeholder="البريد الإلكتروني" required />
            </label>
            <label>
              <span class="ouasl_field-title"></span>
              <textarea name="message" placeholder="رسالتك" rows="5" required></textarea>
            </label>
            <button type="submit" class="contact-submit">أرسل الرسالة</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
