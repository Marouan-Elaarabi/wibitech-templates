<link rel="stylesheet" href="./contact-5.css">

  <section id="seclayout-contact-5" data-name="seclayout-contact-5" data-tag="section, form">
    <div class="container">
      <div class="content">
        <h2 class="contact-title wrapper">اتصل بنا</h2>
        <div class="contact-body">
          <div class="contact-info">
            <div class="contact-info-item">
              <div class="contact-info-icon oa-box__icon">
                <img src="../images/phone-icon.svg" alt="phone">
              </div>
              <div class="contact-info-text">
                <h4 class="wrapper">اتصل بنا</h4>
                <p class="wrapper">+04 2783 3856</p>
              </div>
            </div>
            <div class="contact-info-item">
              <div class="contact-info-icon oa-box__icon">
                <img src="../images/email-icon.svg" alt="email">
              </div>
              <div class="contact-info-text">
                <h4 class="wrapper">البريد الإلكتروني</h4>
                <p class="wrapper">loremipsum@gmail.com</p>
              </div>
            </div>
            <div class="contact-info-item">
              <div class="contact-info-icon oa-box__icon">
                <img src="../images/location-icon.svg" alt="location">
              </div>
              <div class="contact-info-text">
                <h4 class="wrapper">الموقع</h4>
                <p class="wrapper">باندونغ، إندونيسيا</p>
              </div>
            </div>
          </div>
          <form class="contact-form" data-form-type="contact" data-form-name="contact_form_seclayout_5" data-form-id="seclayout-contact-5-form">
            <label>
              <span class="ouasl_field-title"></span>
              <input type="text" name="full_name" placeholder="الاسم الكامل" required />
            </label>
            <label>
              <span class="ouasl_field-title"></span>
              <input type="email" name="email" placeholder="البريد الإلكتروني" required />
            </label>
            <label>
              <span class="ouasl_field-title"></span>
              <textarea name="message" placeholder="رسالتك" rows="4" required></textarea>
            </label>
            <button type="submit" class="submit-btn wrapper">أرسل الآن</button>
          </form>
        </div>
      </div>
    </div>
  </section>
