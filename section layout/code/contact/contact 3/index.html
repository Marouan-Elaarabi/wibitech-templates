<link rel="stylesheet" href="./style.css">

<section id="seclayout-contact-3" data-name="seclayout-contact-3" data-tag="section, form">
  <div class="container">
    <div class="content">
      <div class="contact-image wrapper">
        <img src="https://placehold.co/600x600" alt="صورة التواصل">
      </div>

      <div class="contact-form-body wrapper">
        <h2 class="contact-title">اتصل بنا</h2>
        <p class="contact-description">نحن هنا لمساعدتك. تواصل معنا وسنقوم بالرد عليك في أقرب وقت ممكن.</p>

        <form data-form-type="contact" data-form-name="contact_form_seclayout" data-form-id="seclayout-contact-3-form">
          <label>
            <span class="ouasl_field-title"></span>
            <input type="text" name="full_name" placeholder="الاسم الكامل" required />
          </label>
          <label>
            <span class="ouasl_field-title"></span>
            <input type="email" name="email" placeholder="البريد الالكتروني" required />
          </label>
          <label>
            <span class="ouasl_field-title"></span>
            <textarea name="message" placeholder="رسالتك" rows="5" required></textarea>
          </label>
          <button type="submit" class="contact-submit">أرسل الرسالة</button>
        </form>
      </div>
    </div>
  </div>
</section>
