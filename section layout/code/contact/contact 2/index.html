<link rel="stylesheet" href="./style.css">

<section id="seclayout-contact-2" data-name="seclayout-contact-2" data-tag="section, form">
  <div class="container">
    <div class="content">
      <div class="contact-text">
        <h2 class="contact-title">الاتصال بنا</h2>
        <p class="contact-description">نحن هنا لمساعدتك. تواصل معنا وسنقوم بالرد عليك في أقرب وقت ممكن.</p>
      </div>
      <div class="contact-form-body">
        <form data-form-type="contact" data-form-name="contact_form_seclayout" data-form-id="seclayout-contact-2-form">
          <div class="form-row">
            <label>
              <span class="ouasl_field-title"></span>
              <input type="text" name="first_name" placeholder="الاسم" required />
            </label>
            <label>
              <span class="ouasl_field-title"></span>
              <input type="text" name="last_name" placeholder="النسب" required />
            </label>
          </div>
          <label>
            <span class="ouasl_field-title"></span>
            <input type="email" name="email" placeholder="example@gmail.com" required />
          </label>
          <label>
            <span class="ouasl_field-title"></span>
            <input type="tel" name="phone" placeholder="+512" required />
          </label>
          <button type="submit" class="contact-submit">ارسال</button>
        </form>
      </div>
    </div>
  </div>
</section>

<script src="./index.js"></script>
