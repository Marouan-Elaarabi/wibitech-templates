<link rel="stylesheet" href="style.css" />

<section id="carmaster-carousel" data-name="carmaster-carousel" data-tag="slider">
  <div class="container">

    <div class="cars-features wrapper">
      <div class="info wrapper content-box">
        <h2>المقصورة الداخلية تتميز بجلد نباتي واختيارات خشب الدردار الفاخر.</h2>
        <p>جميع عناصر التحكم — من الفعلية إلى الرقمية — في متناول يديك. المقصورة المتينة والواسعة توفر تحكمًا كاملاً في المناخ الأمامي والخلفي.</p>
        <div class="cta-container wrapper">
          <a href="#" class="get-started">احجز تجربة قيادة الآن</a>
        </div>
      </div>
      <div class="swiper carmaster-sliders-wrapper">
        <div class="swiper carmaster-carousel-slider">
          <div class="swiper-wrapper">
            <div class="swiper-slide mercedes">
            </div>
            <div class="swiper-slide bentley">
            </div>
            <div class="swiper-slide bmw">
            </div>
          </div>
        </div>
        <div class="slider-content wrapper">
          <div class="arrows wrapper">
            <button class="prev-carsSlide-arrow">
              <img src="./leftarrow.svg" alt="left arrow" />
            </button>
            <button class="next-carsSlide-arrow">
              <img src="./rightarrow.svg" alt="right arrow" />
            </button>
          </div>
        </div>
      </div>
      </div>
    </div>

  </div>
</section>
